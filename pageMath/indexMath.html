<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математический тест</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #eef2f7;
            color: #1a1a1a;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        h1 {
            margin-top: 0;
            text-align: center;
        }
        .question-box {
            margin-top: 20px;
        }
        .question-text {
            font-size: 20px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #c7d2e0;
            border-radius: 10px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
        .buttons {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button,
        .back-link {
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            color: #fff;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        button.check {
            background: #2563eb;
        }
        button.next {
            background: #10b981;
        }
        button.reset {
            background: #f97316;
        }
        .back-link {
            background: #6b7280;
        }
        .message {
            margin-top: 16px;
            padding: 14px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            min-height: 48px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Математический тест</h1>
        <p>Отвечай на один вопрос за раз. Если ответ верный, появится следующий.</p>
        <div class="question-box">
            <div class="question-text" id="questionText">5 + 3 =</div>
            <input type="number" id="answerInput" autofocus />
            <div class="buttons">
                <button class="check" onclick="checkAnswer()">Проверить</button>
                <button class="next" onclick="showNextQuestion()" id="nextButton" disabled>Следующий вопрос</button>
                <button class="reset" onclick="resetQuiz()">Начать заново</button>
                <a class="back-link" href="../pageMenu/index.html">Вернуться в меню</a>
            </div>
            <div class="message" id="message">Нажмите «Проверить», чтобы проверить ответ.</div>
        </div>
    </div>
    <script>
        const questions = [
            { text: '5 + 3 =', answer: 8 },
            { text: '14 - 6 =', answer: 8 },
            { text: '4 × 7 =', answer: 28 },
            { text: '24 ÷ 6 =', answer: 4 },
            { text: '8 + 7 × 2 =', answer: 22 },
            { text: '18 - 3 × 4 =', answer: 6 },
            { text: '(5 + 4) × 3 =', answer: 27 },
            { text: '45 ÷ 5 + 7 =', answer: 16 },
            { text: '12 × 2 - 9 =', answer: 15 },
            { text: '6 × (3 + 2) =', answer: 30 }
        ];

        let currentIndex = 0;
        let correctCount = 0;

        const questionText = document.getElementById('questionText');
        const answerInput = document.getElementById('answerInput');
        const nextButton = document.getElementById('nextButton');
        const message = document.getElementById('message');

        function updateQuestion() {
            const current = questions[currentIndex];
            questionText.textContent = current.text;
            answerInput.value = '';
            answerInput.disabled = false;
            nextButton.disabled = true;
            nextButton.textContent = currentIndex === questions.length - 1 ? 'Завершить' : 'Следующий вопрос';
            message.textContent = 'Нажмите «Проверить», чтобы проверить ответ.';
            message.style.background = '#f8fafc';
            message.style.borderColor = '#cbd5e1';
            answerInput.focus();
        }

        function checkAnswer() {
            const current = questions[currentIndex];
            const value = Number(answerInput.value);
            if (answerInput.value === '') {
                message.textContent = 'Введите ответ перед проверкой.';
                return;
            }
            if (value === current.answer) {
                correctCount += 1;
                answerInput.disabled = true;
                nextButton.disabled = false;
                message.textContent = 'Правильно! Нажмите «' + (currentIndex === questions.length - 1 ? 'Завершить' : 'Следующий вопрос') + '». ' + correctCount + ' из ' + questions.length + ' верных.';
                message.style.background = '#dcfce7';
                message.style.borderColor = '#4ade80';
            } else {
                message.textContent = 'Неправильно. Попробуй ещё раз.';
                message.style.background = '#fee2e2';
                message.style.borderColor = '#fca5a5';
            }
        }

        function showNextQuestion() {
            if (currentIndex < questions.length - 1) {
                currentIndex += 1;
                updateQuestion();
            } else {
                questionText.textContent = 'Тест завершён! Ты правильно ответил на ' + correctCount + ' из ' + questions.length + '. Открой заново, чтобы пройти ещё раз.';
                answerInput.value = '';
                answerInput.disabled = true;
                nextButton.disabled = true;
                message.textContent = 'Хорошая работа!';
                message.style.background = '#dbeafe';
                message.style.borderColor = '#93c5fd';
            }
        }

        function resetQuiz() {
            currentIndex = 0;
            correctCount = 0;
            updateQuestion();
        }

        updateQuestion();
    </script>
</body>
</html>
